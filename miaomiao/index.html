    (function () {
      const dice = document.getElementById('dice');
      if (!dice || !randomPool || !randomPool.length) {
        if (dice && (!randomPool || !randomPool.length)) dice.style.display = 'none';
        return;
      }

      const faces = ['⚀', '⚁', '⚂', '⚃', '', '⚅'];
      let lastIdx = -1;
      let rolling = false;

      // 等待 PhotoLightbox 在 client 端挂载完成
      function waitForLightbox() {
        if (window.__PhotoLightboxInstance) return Promise.resolve(window.__PhotoLightboxInstance);
        return new Promise((resolve) => {
          let tries = 0;
          const t = setInterval(() => {
            if (window.__PhotoLightboxInstance) {
              clearInterval(t);
              resolve(window.__PhotoLightboxInstance);
            } else if (++tries > 60) {
              clearInterval(t);
              resolve(null);
            }
          }, 50);
        });
      }

      dice.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (rolling) return;
        rolling = true;

        // 选一张（避免连续重复）
        let pick = 0;
        if (randomPool.length === 1) {
          pick = 0;
        } else {
          do {
            pick = Math.floor(Math.random() * randomPool.length);
          } while (pick === lastIdx);
        }
        lastIdx = pick;

        // 视觉滚动：60ms/帧换面，落在结果面
        dice.classList.add('rolling');
        let ticks = 0;
        const tickTimer = setInterval(() => {
          ticks++;
          dice.textContent = faces[Math.floor(Math.random() * 6)];
        }, 60);

        // 提前预加载图片，避免 lightbox 打开后白一下
        const item = randomPool[pick];
        const preload = new Image();
        preload.src = item.full;

        setTimeout(async () => {
          clearInterval(tickTimer);
          dice.classList.remove('rolling');
          dice.textContent = faces[pick % 6];

          const lb = await waitForLightbox();
          if (!lb) {
            rolling = false;
            return;
          }
          // 单张随机：构造一个单元素相册
          const photo = {
            id: item.id,
            bg: `url(${item.thumb}) center/cover no-repeat`,
            full: item.full,
            node: dice,
          };
          lb.open([photo], 0);
          rolling = false;
        }, 280);
      });
    })();
  })();</script>  </div> </body></html>
